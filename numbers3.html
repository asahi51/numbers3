<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="apple-mobile-web-app-capable" content="yes"><title>N3予想</title></head><body style="background:#060912;color:#dde3f0;font-family:sans-serif;margin:0;padding:0"><div style="background:linear-gradient(135deg,#0d1b3e,#0a1628);padding:14px 18px;display:flex;align-items:center;gap:12px"><div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff">N3</div><div><div style="font-size:16px;font-weight:800">ナンバーズ3 AI予想</div><div style="font-size:10px;color:#4a7ab5">18要素 × Claude AI</div></div></div><div style="padding:20px;max-width:560px;margin:0 auto"><div style="background:#0d1828;border-radius:12px;border:1px solid #1a2d42;padding:14px;margin-bottom:16px"><div style="font-size:11px;color:#3a5a7a;margin-bottom:12px">▶ 当選番号を入力</div><div style="display:flex;gap:8px;margin-bottom:8px"><input id="iRound" placeholder="回号（例：第6979回）" style="flex:1;padding:10px;background:#060912;border:1px solid #1a2d42;border-radius:8px;color:#dde3f0;font-size:13px"><input id="iDate" type="date" style="width:140px;padding:10px;background:#060912;border:1px solid #1a2d42;border-radius:8px;color:#dde3f0;font-size:13px"></div><div style="display:flex;gap:8px"><input id="iNum" maxlength="3" placeholder="369" style="flex:1;padding:10px;background:#060912;border:1px solid #1a2d42;border-radius:8px;color:#dde3f0;font-size:22px;text-align:center;letter-spacing:10px;font-weight:700"><button onclick="add()" style="padding:10px 18px;background:#f59e0b;border:none;border-radius:8px;font-weight:800;cursor:pointer">追加</button></div></div><div style="background:#0d1828;border-radius:12px;border:1px solid #1a2d42;padding:14px;margin-bottom:16px"><div style="font-size:11px;color:#3a5a7a;margin-bottom:12px">▶ 次回抽選の設定</div><div style="display:flex;gap:8px"><input id="nRound" placeholder="次回回号（例：第6980回）" style="flex:1;padding:10px;background:#060912;border:1px solid #1a2d42;border-radius:8px;color:#dde3f0;font-size:13px"><input id="nDate" type="date" style="width:140px;padding:10px;background:#060912;border:1px solid #1a2d42;border-radius:8px;color:#dde3f0;font-size:13px"></div></div><button onclick="runAI()" id="aiBtn" style="width:100%;padding:16px;border-radius:12px;background:linear-gradient(135deg,#1a4a8a,#2563eb);border:1px solid #3b82f6;color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:16px">🤖　18要素 AI分析 → 次回予想を生成</button><div id="hist" style="margin-bottom:16px"></div><div id="out"></div></div><script>
const K='n3h';const W=['日','月','火','水','木','金','土'];
let H=[];try{H=JSON.parse(localStorage.getItem(K)||'[]')}catch{}
document.getElementById('nDate').value=new Date(Date.now()+86400000).toISOString().slice(0,10);
document.getElementById('iDate').value=new Date().toISOString().slice(0,10);
render();
function save(){localStorage.setItem(K,JSON.stringify(H))}
function add(){
  const n=document.getElementById('iNum').value.trim();
  if(!/^\d{3}$/.test(n)){alert('3桁の数字を入力してください');return}
  H.push({id:Date.now(),number:n,round:document.getElementById('iRound').value||'？回',date:document.getElementById('iDate').value||new Date().toISOString().slice(0,10)});
  save();document.getElementById('iNum').value='';document.getElementById('iRound').value='';render();
}
function render(){
  document.getElementById('hist').innerHTML='<div style="font-size:12px;color:#3a5a7a;margin-bottom:8px">蓄積：'+H.length+'件</div>'+[...H].reverse().slice(0,20).map(e=>{
    const nums=e.number.split('').map(Number);
    const d=new Date(e.date);const wd=isNaN(d)?'':W[d.getDay()];
    return '<div style="display:flex;align-items:center;gap:8px;padding:10px;background:#0d1828;border-radius:10px;border:1px solid #1a2d42;margin-bottom:6px"><div style="font-size:10px;color:#3a5a7a;min-width:80px">'+e.round+'<br>'+e.date+' '+wd+'曜</div><div style="display:flex;gap:4px">'+nums.map(n=>'<span style="width:28px;height:28px;border-radius:50%;background:hsl('+n*36+',65%,40%);display:inline-flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:13px">'+n+'</span>').join('')+'</div><div style="font-size:10px;color:#3a5a7a;margin-left:auto">合計'+nums.reduce((a,b)=>a+b,0)+'</div><button onclick="del('+e.id+')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px">×</button></div>'
  }).join('');
}
function del(id){H=H.filter(e=>e.id!==id);save();render()}
async function runAI(){
  if(H.length<3){alert('3件以上データが必要です');return}
  const btn=document.getElementById('aiBtn');
  btn.disabled=true;btn.textContent='⏳ 分析中...';
  const last=H[H.length-1];
  const ura=last.number.split('').map(n=>(+n+5)%10).join('-');
  const lines=H.slice(-20).map(e=>e.round+'('+e.date+'): '+e.number).join('\n');
  const nd=document.getElementById('nDate').value;
  const nr=document.getElementById('nRound').value||'次回';
  const d=new Date(nd);const wd=isNaN(d)?'不明':W[d.getDay()]+'曜日';
  const prompt=`ナンバーズ3の専門分析家として、次回予想を3パターン提案してください。\n\n【直近当選番号】\n${lines}\n\n【前回】${last.number}（裏数字:${ura}）\n【次回】${nr} ${nd}（${wd}）\n\n【18要素（重み）】\n引っ張り10%・直近流れ10%・出現頻度10%・周期10%・九星6%・奇偶6%・合計値6%・ダブル/シングル6%・裏数字6%・カバラ4%・アソシエーション4%・風車盤3%・ゾーン3%・曜日3%・配置系3%・直感3%・重複削除2%・トリプル警戒2%\n\n以下の形式で出力:\n■パターンA「タイトル」\n予想番号: X-X-X\n根拠と総合コメント\n\n■パターンB「タイトル」\n予想番号: X-X-X\n根拠と総合コメント\n\n■パターンC「タイトル」\n予想番号: X-X-X\n根拠と総合コメント`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=(data.content||[]).map(b=>b.text||'').join('\n');
    const colors=['#f59e0b','#22d3ee','#a78bfa'];
    const blocks=text.split(/■パターン[ABC]/);blocks.shift();
    let html='';
    blocks.forEach((b,i)=>{
      const nm=b.match(/予想番号[:：]\s*(\d)[^\d](\d)[^\d](\d)/);
      const tm=b.match(/「(.+?)」/);
      const nums=nm?[+nm[1],+nm[2],+nm[3]]:null;
      const c=colors[i]||'#fff';
      html+='<div style="margin-bottom:16px;border-radius:12px;background:#0d1828;border:1px solid '+c+'44;overflow:hidden">';
      html+='<div style="padding:12px 16px;background:linear-gradient(90deg,'+c+'22,transparent);border-bottom:1px solid '+c+'33;font-weight:800;color:'+c+'">パターン'+'ABC'[i]+(tm?'「'+tm[1]+'」':'')+'</div>';
      if(nums){html+='<div style="padding:16px;display:flex;justify-content:center;gap:16px">'+nums.map(n=>'<span style="width:52px;height:52px;border-radius:50%;background:radial-gradient(circle,hsl('+n*36+',75%,55%),hsl('+n*36+',65%,32%));display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:24px;color:#fff;border:2px solid '+c+'66">'+n+'</span>').join('')+'</div>';}
      html+='<div style="padding:0 14px 14px;font-size:12px;color:#8aaccc;line-height:1.8">'+b.replace(/「.+?」/,'').replace(/予想番号.+/,'').trim()+'</div></div>';
    });
    if(!blocks.length)html='<div style="padding:14px;font-size:12px;color:#8aaccc;white-space:pre-wrap">'+text+'</div>';
    document.getElementById('out').innerHTML=html;
  }catch(e){document.getElementById('out').innerHTML='<div style="color:#ef4444">エラーが発生しました</div>'}
  btn.disabled=false;btn.textContent='🤖　18要素 AI分析 → 次回予想を生成';
}
</script></body></html>
