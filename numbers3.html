ont-weight:800;cursor:pointer;font-family:inherit;letter-spacing:1px}.btn-ai:disabled{background:#1e2d40;color:#3a5a7a;cursor:not-allowed}.entry{display:flex;align-items:center;gap:8px;padding:10px 12px;margin-bottom:6px;background:#0d1828;border-radius:10px;border:1px solid #1a2d42}.emeta{font-size:10px;color:#3a5a7a;min-width:70px;line-height:1.5}.balls{display:flex;gap:5px;flex:1}.ball{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff}.ball-lg{width:54px;height:54px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:26px;color:#fff}.del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;padding:4px 8px}.freq-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}.fbar-w{flex:1;height:18px;background:#0d1828;border-radius:9px;overflow:hidden}.fbar{height:100%;border-radius:9px}.pcard{margin-bottom:18px;border-radius:14px;background:#0d1828;overflow:hidden}.phdr{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom-width:1px;border-bottom-style:solid}.pballs{padding:16px 0;display:flex;justify-content:center;gap:16px}.pmeta{display:flex;justify-content:center;gap:12px;padding-bottom:12px}.tag{padding:3px 10px;background:#060912;border-radius:20px;border:1px solid #1a3050;color:#6a9abf;font-size:11px}.pcom{margin:0 14px 14px;padding:10px 12px;background:#060912;border-radius:8px;font-size:12px;color:#8aaccc;line-height:1.8}.wrow{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0d1828;border-radius:9px;border:1px solid #1a2d42;margin-bottom:6px}.note{margin-top:14px;padding:12px;background:#060912;border-radius:8px;border:1px solid #1a2d42;font-size:11px;color:#3a5a7a;line-height:1.7}.empty{text-align:center;padding:50px 0;color:#3a5a7a;font-size:13px}.spin{display:inline-block;font-size:36px;animation:spin 2s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap}.pg-btn{display:flex;gap:8px;margin-top:12px;justify-content:center}.pg-btn button{padding:6px 14px;background:#0d1828;border:1px solid #1a2d42;border-radius:8px;color:#6a9abf;cursor:pointer;font-size:12px;font-family:inherit}.pg-btn button:disabled{opacity:0.4;cursor:not-allowed}</style></head><body>
<div class="hdr"><div class="logo">N3</div><div><div style="font-size:16px;font-weight:800">ナンバーズ3 AI予想</div><div style="font-size:10px;color:#4a7ab5">18要素 x Claude AI</div></div><div style="margin-left:auto;font-size:11px;color:#3a5a7a" id="hCount">蓄積:0件</div></div>

<script>
const SK='n3_v3_history';

function bc(n){const h=n*36;return'radial-gradient(circle at 35% 35%,hsl('+h+',75%,55%),hsl('+h+',65%,32%))'}
function sw(id,btn){['Input','History','Freq','Predict','Weights'].forEach(t=>document.getElementById('p'+t).style.display='none');document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.getElementById('p'+id.charAt(0).toUpperCase()+id.slice(1)).style.display='block';btn.classList.add('on');renderAll()}
function renderAll(){const s=[...H].sort((a,b)=>String(b.round).localeCompare(String(a.round),undefined,{numeric:true}));document.getElementById('hCount').textContent='蓄積:'+H.length+'件';renderHist(s);renderFreq()}
function renderHist(s){const tot=s.length;const tp=Math.max(1,Math.ceil(tot/PG));if(pg>=tp)pg=tp-1;const sl=s.slice(pg*PG,(pg+1)*PG);document.getElementById('hMeta').textContent='全'+tot+'件 / '+(pg*PG+1)+'〜'+Math.min((pg+1)*PG,tot)+'件';document.getElementById('hList').innerHTML=sl.map(e=>{const n=e.number.split('').map(Number);const d=new Date(e.date);const w=isNaN(d.getTime())?'':WD[d.getDay()];const u=n.map(x=>(x+5)%10).join('-');return'<div class="entry"><div class="emeta">'+e.round+'<br>'+e.date+'<br>'+w+'曜</div><div class="balls">'+n.map(x=>'<span class="ball" style="background:'+bc(x)+'">'+x+'</span>').join('')+'</div><div style="font-size:10px;color:#3a5a7a">裏:'+u+'<br>計'+n.reduce((a,b)=>a+b,0)+'</div><button class="del" onclick="delE('+e.id+')">×</button></div>'}).join('');document.getElementById('pgInfo').textContent=(pg+1)+'/'+tp;document.getElementById('pgPrev').disabled=pg===0;document.getElementById('pgNext').disabled=pg>=tp-1}
function pgMove(d){pg+=d;renderAll()}
function renderFreq(){const c=Array(10).fill(0);H.forEach(e=>e.number.split('').map(Number).forEach(d=>c[d]++));const mx=Math.max(...c,1);document.getElementById('fMeta').textContent='全'+H.length+'回分';document.getElementById('fList').innerHTML=c.map((cnt,d)=>{const h=d*36;const w=Math.round((cnt/mx)*100);return'<div class="freq-row"><span class="ball" style="width:32px;height:32px;font-size:15px;background:'+bc(d)+'">'+d+'</span><div class="fbar-w"><div class="fbar" style="width:'+w+'%;background:linear-gradient(90deg,hsl('+h+',65%,35%),hsl('+(h+20)+',75%,50%))"></div></div><span style="font-size:13px;color:#6a9abf;min-width:36px;text-align:right">'+cnt+'回</span></div>'}).join('');const t5=c.map((cnt,d)=>({cnt,d})).sort((a,b)=>b.cnt-a.cnt).slice(0,5);document.getElementById('fTop').innerHTML=t5.map(({cnt,d})=>'<div style="display:flex;align-items:center;gap:4px;padding:4px 10px;background:#060912;border-radius:20px"><span class="ball" style="width:20px;height:20px;font-size:11px;background:'+bc(d)+'">'+d+'</span><span style="font-size:11px;color:#6a9abf">'+cnt+'回</span></div>').join('')}
function buildWeights(){document.getElementById('wList').innerHTML=WT.map(w=>{const col=w.p>=10?'#f59e0b':w.p>=6?'#22d3ee':w.p>=4?'#a78bfa':'#4a7ab5';return'<div class="wrow"><span style="font-size:13px;color:#aec8e4;flex:1">'+w.l+'</span><div style="width:80px;height:6px;background:#060912;border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:'+(w.p*10)+'%;background:'+col+'"></div></div><span style="font-size:13px;font-weight:700;color:'+col+';min-width:32px;text-align:right">'+w.p+'%</span></div>'}).join('')}
function addE(){const n=document.getElementById('iNum').value.trim();if(!/^\d{3}$/.test(n)){showToast('3桁の数字を入力してください','err');return}H.push({id:Date.now(),number:n,round:document.getElementById('iRound').value||'?',date:document.getElementById('iDate').value||new Date().toISOString().slice(0,10)});save();document.getElementById('iNum').value='';document.getElementById('iRound').value='';renderAll();showToast('追加しました')}
function delE(id){H=H.filter(e=>e.id!==id);save();renderAll();showToast('削除しました','warn')}
async function runAI(){if(H.length<3){showToast('3件以上必要です','err');return}const btn=document.getElementById('aiBtn');btn.disabled=true;btn.textContent='⏳ 分析中...';sw('predict',document.querySelectorAll('.tab')[3]);document.getElementById('predOut').innerHTML='<div style="text-align:center;padding:40px 0;color:#4a7ab5"><div class="spin">⚙️</div><div style="font-weight:700;margin-top:12px">18要素を分析中...</div></div>';const s=[...H].sort((a,b)=>String(a.round).localeCompare(String(b.round),undefined,{numeric:true}));const r=s.slice(-30);const lines=r.map(e=>e.round+'('+e.date+'): '+e.number).join('\n');const last=s[s.length-1];const ura=last.number.split('').map(n=>(+n+5)%10).join('-');const nr=document.getElementById('nRound').value||'次回';const nd=document.getElementById('nDate').value||'';const d=new Date(nd);const wd=isNaN(d.getTime())?'不明':WD[d.getDay()]+'曜日';const wl=WT.map(w=>'・'+w.l+'('+w.p+'%)').join('\n');const prompt='あなたはナンバーズ3の専門分析家です。以下のデータと18の分析要素を用いて次回予想を3パターン提案してください。\n\n【直近当選番号】\n'+lines+'\n\n【前回】'+last.number+'(裏数字:'+ura+')\n【次回】'+nr+' '+nd+'('+wd+')\n\n【18要素】\n'+wl+'\n\n【出力形式】\n■ パターンA「タイトル」\n予想番号: X-X-X\n合計値: XX 奇偶: 奇X偶X 種別: シングル/ダブル\n総合コメント: (2〜3文)\n\n■ パターンB「タイトル」\n予想番号: X-X-X\n総合コメント: (2〜3文)\n\n■ パターンC「タイトル」\n予想番号: X-X-X\n総合コメント: (2〜3文)\n\n---\n総評(1〜2文)\n\n※予想番号は必ず数字-数字-数字形式で';try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-calls':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});const data=await res.json();const text=(data.content||[]).map(b=>b.text||'').join('\n');renderP(text)}catch(e){document.getElementById('predOut').innerHTML='<div class="empty" style="color:#ef4444">エラーが発生しました。再度お試しください。</div>'}btn.disabled=false;btn.textContent='🤖 18要素 AI分析 → 次回予想を生成'}
function renderP(text){const cols=['#f59e0b','#22d3ee','#a78bfa'];const blocks=text.split(/■\s*パターン[ABC]/);blocks.shift();let html='';blocks.forEach((b,i)=>{const col=cols[i]||'#94a3b8';const tm=b.match(/「(.+?)」/);const nm=b.match(/予想番号[:：]\s*(\d)[^\d](\d)[^\d](\d)/);const nums=nm?[+nm[1],+nm[2],+nm[3]]:null;const km=b.match(/(シングル|ダブル|トリプル)/);const cm=b.match(/総合コメント[:：]\s*(.+?)(?=\n■|\n---|\n\n|$)/s);const sum=nums?nums.reduce((a,c)=>a+c,0):'?';const odd=nums?nums.filter(n=>n%2!==0).length:'?';html+='<div class="pcard" style="border:1px solid '+col+'44"><div class="phdr" style="background:linear-gradient(90deg,'+col+'22,transparent);border-bottom-color:'+col+'33"><span style="font-weight:800;color:'+col+';font-size:14px">パターン'+'ABC'[i]+(tm?'「'+tm[1]+'」':'')+'</span></div><div class="pballs">'+(nums?nums.map(n=>'<span class="ball-lg" style="background:radial-gradient(circle at 35% 35%,hsl('+(n*36)+',75%,55%),hsl('+(n*36)+',65%,32%));border:2px solid '+col+'66">'+n+'</span>').join(''):'<span style="color:#3a5a7a">解析中...</span>')+'</div><div class="pmeta"><span class="tag">合計:'+sum+'</span><span class="tag">奇'+odd+'偶'+(nums?3-odd:'?')+'</span><span class="tag">'+(km?km[1]:'シングル')+'</span></div>'+(cm?'<div class="pcom">'+cm[1].trim()+'</div>':'')+'</div>'});const sm=text.match(/---\s*\n([\s\S]+)$/);if(sm)html+='<div style="padding:14px;background:#0d1828;border-radius:10px;border:1px solid #1a3a5a;font-size:12px;color:#6a9abf;line-height:1.9;margin-bottom:14px"><div style="font-size:11px;color:#3a5a7a;margin-bottom:6px">▶ 総合評価</div>'+sm[1].trim()+'</div>';if(!blocks.length)html='<div style="padding:14px;font-size:12px;color:#8aaccc;white-space:pre-wrap">'+text+'</div>';html+='<div class="note">⚠️ ナンバーズ3は完全独立の抽選です。予想は参考としてお楽しみください。</div>';document.getElementById('predOut').innerHTML=html}
